name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, zip, sqlite3, pgsql
          coverage: none

      - name: Validate composer
        run: composer validate --no-interaction

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Migrate database
        run: php artisan migrate --force

      - name: Run PHP tests
        run: php artisan test

      - name: Run Pint
        run: ./vendor/bin/pint --test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (oxlint + oxfmt)
        run: npm run lint

      - name: Konsistent
        run: npm run konsistent
        env:
          KONSISTENT_NO_UPDATE_CHECK: "true"

      - name: Build assets
        run: npm run build

      - name: Test
        run: npm run test --if-present

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, zip, sqlite3, pgsql
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run E2E tests (real backend — auth flows)
        run: npx playwright test tests/E2E/flows/auth-user-flow.real.spec.ts --project=real-backend
